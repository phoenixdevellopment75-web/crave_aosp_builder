name: Build PixelOS 15 for Pixel 3 XL

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-pixelos-crosshatch.yml"
      - "config/**"
      - "manifests/**"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: pixelos-crosshatch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            adb autoconf automake axel bc bison build-essential ccache curl expat \
            fastboot flex g++ g++-multilib gawk gcc gcc-multilib git git-lfs gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev \
            libgl1-mesa-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lzop openjdk-17-jdk pngcrush \
            python-is-python3 rsync schedtool squashfs-tools unzip x11proto-core-dev \
            xsltproc zip zlib1g-dev

      - name: Install repo tool
        run: |
          mkdir -p "${HOME}/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "${HOME}/bin/repo"
          chmod a+x "${HOME}/bin/repo"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"

      - name: Mark scripts executable
        run: chmod +x scripts/*.sh

      - name: Prepare workspace directories
        run: |
          mkdir -p artifacts logs ccache
          df -h
          free -h

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-crosshatch-${{ github.ref_name }}-v1
          restore-keys: |
            ccache-crosshatch-${{ github.ref_name }}-
            ccache-crosshatch-

      - name: Bootstrap PixelOS source
        run: bash scripts/bootstrap-repo.sh

      - name: Sync sources
        run: bash scripts/sync-sources.sh

      - name: Check disk after sync
        run: |
          df -h
          du -sh source/.repo || true
          du -sh source/device/google/crosshatch || true

      - name: Build ROM
        run: bash scripts/build-rom.sh
        env:
          REPO_SYNC_JOBS: 4
          BUILD_JOBS: 3
          CCACHE_MAXSIZE: 8G

      - name: Check disk after build
        if: always()
        run: |
          df -h
          du -sh source/out || true
          du -sh artifacts || true

      - name: Collect artifacts
        if: always()
        run: bash scripts/collect-artifacts.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pixelos-crosshatch-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pixelos-crosshatch-${{ github.run_number }}
          path: artifacts/
          retention-days: 14
