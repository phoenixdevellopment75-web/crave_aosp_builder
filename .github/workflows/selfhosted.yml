#
# Fixed PixelOS Builder for Pixel 3 XL (crosshatch)
# Fixes: crave.conf path, runner label, project matching
#

name: PixelOS Builder

on:
  workflow_dispatch:
    inputs:
      BASE_PROJECT:
        description: 'Choose a base project:'
        required: true
        default: 'PixelOS 15'
        type: choice
        options:
          - 'PixelOS 15'
          - 'LineageOS 22.1'
          - 'LineageOS 21.0'
          - 'AOSP'

      LOCAL_MANIFEST:
        description: "Local manifest URL (git repo or raw .xml):"
        required: true
        default: 'https://github.com/sounddrill31/local_manifests_oxygen'

      LOCAL_MANIFEST_BRANCH:
        description: "Local manifest branch:"
        required: false
        default: 'main'

      DEVICE_NAME:
        description: "Device codename:"
        required: true
        default: "crosshatch"

      PRODUCT_NAME:
        description: "Product to build:"
        required: true
        default: "aosp_crosshatch"

      BUILD_COMMAND:
        description: 'Build command:'
        required: true
        default: 'mka bacon'

      BUILD_TYPE:
        description: 'Build type:'
        required: true
        default: 'userdebug'
        type: choice
        options:
          - 'userdebug'
          - 'user'
          - 'eng'

      CLEAN_BUILD:
        description: 'Clean build workspace?'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  prepare:
    name: Prepare Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [[ -z "${{ secrets.CRAVE_TOKEN }}" || -z "${{ secrets.CRAVE_USERNAME }}" ]]; then
            echo "❌ ERROR: CRAVE_TOKEN or CRAVE_USERNAME is missing!"
            exit 1
          fi
          if [[ -z "${{ secrets.TELEGRAM_TO }}" || -z "${{ secrets.TELEGRAM_TOKEN }}" ]]; then
            echo "⚠️  WARNING: Telegram secrets missing - notifications disabled"
          else
            echo "✅ Telegram notifications enabled"
          fi
          echo "✅ All required secrets configured"

      - name: Set project variables
        id: set-vars
        run: |
          case "${{ github.event.inputs.BASE_PROJECT }}" in
            "PixelOS 15")
              PROJECTFOLDER="/crave-devspaces/Pixel15"
              PROJECTID="82"
              REPO_INIT="repo init -u https://github.com/PixelOS-AOSP/manifest.git -b fifteen --git-lfs --depth=1"
              ;;
            "LineageOS 22.1")
              PROJECTFOLDER="/crave-devspaces/Lineage22"
              PROJECTID="93"
              REPO_INIT="repo init -u https://github.com/accupara/los22.git -b lineage-22.1 --git-lfs --depth=1"
              ;;
            "LineageOS 21.0")
              PROJECTFOLDER="/crave-devspaces/Lineage21"
              PROJECTID="72"
              REPO_INIT="repo init -u https://github.com/LineageOS/android.git -b lineage-21.0 --git-lfs --depth=1"
              ;;
            "AOSP")
              PROJECTFOLDER="/crave-devspaces/AOSP"
              PROJECTID="35"
              REPO_INIT="repo init -u https://android.googlesource.com/platform/manifest.git -b master --git-lfs --depth=1"
              ;;
          esac

          PRODUCT="${{ github.event.inputs.PRODUCT_NAME }}"
          BUILD_TYPE="${{ github.event.inputs.BUILD_TYPE }}"
          LUNCH="lunch ${PRODUCT}-${BUILD_TYPE}"

          LOCAL_MANIFEST_URL="${{ github.event.inputs.LOCAL_MANIFEST }}"
          LOCAL_MANIFEST_URL="${LOCAL_MANIFEST_URL%/}"
          if [[ "$LOCAL_MANIFEST_URL" =~ \.xml$ ]]; then
            LOCAL_MANIFEST_CMD="mkdir -p .repo/local_manifests && curl -o .repo/local_manifests/local_manifest.xml ${LOCAL_MANIFEST_URL}"
          else
            LOCAL_MANIFEST_CMD="git clone ${LOCAL_MANIFEST_URL} --depth 1 -b ${{ github.event.inputs.LOCAL_MANIFEST_BRANCH }} .repo/local_manifests"
          fi

          echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_OUTPUT"
          echo "PROJECTID=$PROJECTID"         >> "$GITHUB_OUTPUT"
          echo "REPO_INIT=$REPO_INIT"         >> "$GITHUB_OUTPUT"
          echo "LUNCH=$LUNCH"                 >> "$GITHUB_OUTPUT"
          echo "LOCAL_MANIFEST_CMD=$LOCAL_MANIFEST_CMD" >> "$GITHUB_OUTPUT"

    outputs:
      PROJECTFOLDER:    ${{ steps.set-vars.outputs.PROJECTFOLDER }}
      PROJECTID:        ${{ steps.set-vars.outputs.PROJECTID }}
      REPO_INIT:        ${{ steps.set-vars.outputs.REPO_INIT }}
      LUNCH:            ${{ steps.set-vars.outputs.LUNCH }}
      LOCAL_MANIFEST_CMD: ${{ steps.set-vars.outputs.LOCAL_MANIFEST_CMD }}

  test:
    name: Test Manifest
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Configure git
        run: |
          git config --global user.name  "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Test local manifest
        timeout-minutes: 10
        run: |
          rm -rf test && mkdir test && cd test
          ${{ needs.prepare.outputs.REPO_INIT }}
          bash -c "${{ needs.prepare.outputs.LOCAL_MANIFEST_CMD }}"
          timeout 1m repo sync --force-sync || {
            code=$?
            [ $code -eq 124 ] || exit $code
          }
          echo "✅ Manifest test passed"

    outputs:
      PROJECTFOLDER:    ${{ needs.prepare.outputs.PROJECTFOLDER }}
      PROJECTID:        ${{ needs.prepare.outputs.PROJECTID }}
      REPO_INIT:        ${{ needs.prepare.outputs.REPO_INIT }}
      LUNCH:            ${{ needs.prepare.outputs.LUNCH }}
      LOCAL_MANIFEST_CMD: ${{ needs.prepare.outputs.LOCAL_MANIFEST_CMD }}

  build:
    name: Build ROM
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gettext-base

      - name: Configure crave CLI
        run: |
          # Download crave binary
          mkdir -p "${HOME}/bin"
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv "${PWD}/crave" "${HOME}/bin/crave"
          chmod +x "${HOME}/bin/crave"
          echo "${HOME}/bin" >> $GITHUB_PATH

          # FIX: Write crave.conf directly to HOME (where crave CLI expects it)
          cat > "${HOME}/crave.conf" << EOF
          {
            "username": "${{ secrets.CRAVE_USERNAME }}",
            "token": "${{ secrets.CRAVE_TOKEN }}"
          }
          EOF

          echo "✅ crave.conf written to ${HOME}/crave.conf"
          cat "${HOME}/crave.conf"

      - name: Configure git
        run: |
          git config --global user.name  "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Telegram - Build Started
        continue-on-error: true
        run: |
          if [[ -n "${{ secrets.TELEGRAM_TOKEN }}" && -n "${{ secrets.TELEGRAM_TO }}" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_TO }}" \
              -d parse_mode="Markdown" \
              -d text="🚀 *Build Started*%0A%0A📱 Device: \`${{ github.event.inputs.DEVICE_NAME }}\`%0A📦 Product: \`${{ github.event.inputs.PRODUCT_NAME }}\`%0A🎯 Project: ${{ github.event.inputs.BASE_PROJECT }}%0A%0A[View Progress →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

      - name: Start crave build
        timeout-minutes: 1440
        run: |
          CLEAN_FLAG=""
          [[ "${{ github.event.inputs.CLEAN_BUILD }}" == "yes" ]] && CLEAN_FLAG="--clean"

          # FIX: Pass project ID explicitly so crave doesn't try to match by repo name
          crave run \
            --no-patch \
            $CLEAN_FLAG \
            -p "${{ needs.test.outputs.PROJECTID }}" \
            -- "
            set -e

            # Remove old local manifests
            rm -rf .repo/local_manifests/

            # Init repo
            ${{ needs.test.outputs.REPO_INIT }}

            # Clone local manifests
            ${{ needs.test.outputs.LOCAL_MANIFEST_CMD }}

            # Sync
            if [ -f /usr/bin/resync ]; then
              /usr/bin/resync
            else
              /opt/crave/resync.sh
            fi

            export BUILD_USERNAME=${{ github.actor }}
            export BUILD_HOSTNAME=crave

            source build/envsetup.sh

            echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
            echo 'Device  : ${{ github.event.inputs.DEVICE_NAME }}'
            echo 'Product : ${{ github.event.inputs.PRODUCT_NAME }}'
            echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'

            ${{ needs.test.outputs.LUNCH }}
            make installclean
            ${{ github.event.inputs.BUILD_COMMAND }}
          "

      - name: Upload to GitHub Release
        if: success()
        continue-on-error: true
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" > token.txt
          crave push token.txt -d "$(crave ssh -- pwd | grep -v Select | sed 's/\r//g')/" || true
          rm -f token.txt

          crave ssh -- "
            if [ -f /opt/crave/github-actions/upload.sh ]; then
              bash /opt/crave/github-actions/upload.sh \
                '${{ github.run_id }}' \
                '${{ github.event.inputs.DEVICE_NAME }}' \
                '${{ github.repository }}' \
                '${{ github.event.inputs.PRODUCT_NAME }}-${{ github.run_id }}'
            else
              echo 'Upload script not found'
            fi
          " || echo "Upload skipped"

      - name: Telegram - Success
        if: success()
        continue-on-error: true
        run: |
          if [[ -n "${{ secrets.TELEGRAM_TOKEN }}" && -n "${{ secrets.TELEGRAM_TO }}" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_TO }}" \
              -d parse_mode="Markdown" \
              -d text="✅ *Build Succeeded!*%0A%0A📱 Device: \`${{ github.event.inputs.DEVICE_NAME }}\`%0A📦 Product: \`${{ github.event.inputs.PRODUCT_NAME }}\`%0A🎯 Project: ${{ github.event.inputs.BASE_PROJECT }}%0A%0A[View Run →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})%0A[Download →](https://github.com/${{ github.repository }}/releases/tag/${{ github.run_id }})"
          fi

      - name: Telegram - Failed
        if: failure() || cancelled()
        continue-on-error: true
        run: |
          if [[ -n "${{ secrets.TELEGRAM_TOKEN }}" && -n "${{ secrets.TELEGRAM_TO }}" ]]; then
            STATUS="${{ job.status }}"
            ICON="❌" && WORD="Failed"
            [[ "$STATUS" == "cancelled" ]] && ICON="🚫" && WORD="Cancelled"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_TO }}" \
              -d parse_mode="Markdown" \
              -d text="${ICON} *Build ${WORD}*%0A%0A📱 Device: \`${{ github.event.inputs.DEVICE_NAME }}\`%0A[View Logs →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

      - name: Show error log
        if: failure()
        continue-on-error: true
        run: |
          crave ssh -- "cat ${{ needs.test.outputs.PROJECTFOLDER }}/out/error.log 2>/dev/null || echo 'No error.log'" || true

      - name: Cleanup
        if: always()
        run: crave stop --all || true
