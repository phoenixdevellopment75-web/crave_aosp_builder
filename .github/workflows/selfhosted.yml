build:
    name: Build using foss.crave.io
    needs: prepare
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository_owner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Telegram Notification (Start)
      continue-on-error: true
      run: |
        curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
        -d chat_id=${{ secrets.TELEGRAM_TO }} \
        -d text="🚀 *Build Started*%0ADevice: ${{ github.event.inputs.DEVICE_NAME }}%0AProject: ${{ github.event.inputs.BASE_PROJECT }}" \
        -d parse_mode="Markdown"

    - name: Create Project Folders & Set up Crave
      run: |
        mkdir -p ${HOME}/bin
        curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash
        mv crave ${HOME}/bin/
        sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
        sudo chmod +x /usr/bin/crave
        
        # CRITICAL: Move crave.conf to the home directory so the CLI always finds it
        envsubst < crave.conf.sample > ${HOME}/crave.conf
      env:
        CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
        CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}

    - name: Start Crave Build
      run: |
        # Explicitly passing the Project ID tells Crave exactly which server to use
        crave run --projectID ${{ needs.prepare.outputs.PROJECTID }} --no-patch -- /bin/bash <<EOF
        rm -rf .repo/local_manifests/
        ${{ needs.prepare.outputs.REPO_INIT }}
        ${{ needs.prepare.outputs.LOCAL_MANIFEST }}
        /opt/crave/resync.sh
        source build/envsetup.sh
        ${{ needs.prepare.outputs.LUNCH }}
        ${{ github.event.inputs.BUILD_COMMAND }}
        EOF
      timeout-minutes: 1440

    - name: Telegram Notification (Status)
      if: always()
      run: |
        curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
        -d chat_id=${{ secrets.TELEGRAM_TO }} \
        -d text="🏁 *Build Finished*%0AStatus: ${{ job.status }}%0ADevice: ${{ github.event.inputs.DEVICE_NAME }}" \
        -d parse_mode="Markdown"
